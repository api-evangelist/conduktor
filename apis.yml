aid: conduktor
url: https://raw.githubusercontent.com/api-evangelist/conduktor/refs/heads/main/apis.yml
name: Conduktor
kind: company
description: Conduktor is an Apache Kafka management and data-governance platform. Conduktor
  Console provides a REST API and CLI to manage clusters, topics, consumer groups,
  certificates, users, groups, and granular RBAC, plus declarative Self-Service resources
  (Application, ApplicationInstance, TopicPolicy). Conduktor Gateway is a Kafka proxy
  with a REST API for interceptors (data security, quality, governance) and virtual
  clusters.
image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
tags:
- Apache Kafka
- Streaming
- Data Governance
- Kafka Management
- Gateway
