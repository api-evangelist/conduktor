meters:
- name: console_seats
  description: Conduktor Console Team edition seats, billed per seat per month or year.
  unit: seats
  aggregation: sum
  dimensions:
  - organization
  - edition
- name: gateway_clusters
  description: Kafka clusters licensed under Gateway Enterprise, 3-cluster minimum.
  unit: clusters
  aggregation: sum
  dimensions:
  - organization
- name: gateway_addons
  description: Optional Gateway add-ons such as DR & Failover and Protect.
  unit: add-ons
  aggregation: sum
  dimensions:
  - organization
  - addon
- name: enterprise_agreement
  description: Negotiated Enterprise contract value for Console and/or Gateway.
  unit: contract
  aggregation: sum
  dimensions:
  - organization
principles:
- name: Visibility
  description: >-
    Track active Console seats, licensed Gateway clusters, and enabled add-ons;
    Console Insights chargeback attributes Kafka usage back to teams.
- name: Allocation
  description: >-
    Map seats to teams and licensed clusters/virtual clusters to cost centers;
    use Self-Service ApplicationInstances to associate resources with owners.
- name: Optimization
  description: >-
    Stay within Community limits where possible; right-size paid seats and
    licensed clusters; consolidate workloads onto virtual clusters; only enable
    Gateway add-ons that are required.
- name: Accountability
  description: >-
    Assign owners per application/team; review seat counts, cluster licenses,
    and add-on spend against budget each renewal cycle.
