provider: Conduktor
providerId: conduktor
created: '2026-06-21'
modified: '2026-06-21'
reconciled: false
tags:
- Apache Kafka
- Streaming
- Data Governance
- Kafka Management
- Gateway
- FinOps
- Cost Management
- FOCUS
description: >-
  FinOps view of Conduktor spend. Conduktor is licensed per product rather than
  by API usage: Console bills per seat (Team edition) or via an Enterprise
  agreement, with a free Community edition (up to 50 users / 3 clusters);
  Gateway bills per Kafka cluster (3-cluster minimum) under Enterprise, with a
  free Community edition. Primary cost drivers are seats, managed clusters, and
  Gateway add-ons (DR & Failover, Protect).
notes: >-
  Subscription and per-cluster prices are subject to change and negotiation;
  verify against the Conduktor pricing page and contract during reconciliation.
sources:
- https://www.conduktor.io/pricing/
- https://docs.conduktor.io/
- https://focus.finops.org/focus-specification/v1-3/
alignedWith:
  framework: FinOps Foundation Framework
  frameworkUrl: https://www.finops.org/framework/
  dataSpec: FOCUS
  dataSpecVersion: '1.3'
  dataSpecUrl: https://focus.finops.org/focus-specification/v1-3/
publisherName: Conduktor
serviceCategory: Analytics and Data Management
billingModel:
  pricingCategory: Subscription
  billingFrequency: Monthly
  billingCurrency: USD
  chargeCategories:
  - Purchase
  - Usage
  - Adjustment
focusColumns:
  ServiceName: Conduktor
  ServiceCategory: Analytics and Data Management
  ProviderName: Conduktor
  PublisherName: Conduktor
  InvoiceIssuerName: Conduktor
  BillingCurrency: USD
